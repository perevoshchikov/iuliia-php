name: build
on:
  pull_request:
    paths-ignore:
      - '**.md'
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'

jobs:
  cs:
    runs-on: ubuntu-latest
    name: Code style
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          tools: composer:v2
      - name: Install dependencies
        run: composer update --no-ansi --no-interaction --no-progress --prefer-dist
      - name: Show dependencies
        run: composer show
      - name: Run phpcs
        run: composer check-style

  analysis:
    runs-on: ubuntu-latest
    name: Static analysis
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          tools: composer:v2
          coverage: xdebug
      - name: Install dependencies
        run: composer update --no-ansi --no-interaction --no-progress --prefer-dist
      - name: Show dependencies
        run: composer show
      - name: Run phpstan
        run: composer stan

  tests:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      max-parallel: 15
      matrix:
        operating-system: [ ubuntu-latest ]
        php-versions: [ '7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5' ]
    name: Unit tests on PHP ${{ matrix.php-versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer:v2
      - name: Install dependencies
        run: composer update --no-ansi --no-interaction --no-progress --prefer-dist
      - name: Show dependencies
        run: composer show
      - name: Run phpunit
        run: composer test
